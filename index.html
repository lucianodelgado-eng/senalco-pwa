<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>App Relevamiento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="estilo.css" />
    <script defer src="login.js"></script>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0b1b2a" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #0d1b2a, #1b263b);
            color: white;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #f72585;
            margin-bottom: 10px;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .subtitulo {
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .panel-login,
        .panel-modulos {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.12);
        }

        .panel-modulos {
            display: none;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #023e8a;
        }

        .modulo-btn {
            margin-top: 12px;
        }

        .mensaje {
            margin-top: 12px;
            min-height: 20px;
            font-size: 14px;
            color: #ffd166;
        }

        .usuario-logueado {
            margin-bottom: 15px;
            font-weight: bold;
            color: #90e0ef;
        }

        .btn-salir {
            background-color: #9d0208;
        }

        .btn-salir:hover {
            background-color: #6a040f;
        }
    </style>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js")
                    .then(() => console.log("✅ SW OK"))
                    .catch(err => console.error("❌ SW error", err));
            });
        }
    </script>
</head>
<body>
    <img src="images/logo_blanco.jpg" alt="Logo Señalco" class="logo" />
    <h1>Ingreso al sistema Señalco</h1>
    <div class="subtitulo">Relevamiento, Base de Datos y CCTV</div>

    <div id="panel-login" class="panel-login">
        <h3>Acceso</h3>
        <input type="text" id="usuario" placeholder="Usuario" />
        <input type="password" id="clave" placeholder="Clave" />
        <button onclick="validarLogin()">Entrar</button>
        <div id="mensaje-login" class="mensaje"></div>
    </div>

    <div id="panel-modulos" class="panel-modulos">
        <div id="usuario-logueado" class="usuario-logueado"></div>

        <h3>Módulos habilitados</h3>

        <button id="btn-relevamiento" class="modulo-btn" style="display:none;">
            Abrir Relevamiento
        </button>

        <button id="btn-base" class="modulo-btn" style="display:none;">
            Abrir Base de Datos
        </button>

        <button id="btn-cctv" class="modulo-btn" style="display:none;">
            Abrir CCTV
        </button>

        <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</body>
</html>
