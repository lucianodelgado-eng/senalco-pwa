<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Señalco - Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="estilo.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b1b2a" />

  <script defer src="login.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #0d1b2a, #1b263b);
      color: #fff;
      margin: 0;
      min-height: 100vh;
      padding: 30px 16px;
      box-sizing: border-box;
    }

    .contenedor {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: block;
      width: 140px;
      max-width: 70%;
      margin: 0 auto 18px auto;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 28px;
      color: #ffffff;
    }

    .sub {
      text-align: center;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    .login-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      outline: none;
    }

    .login-btn,
    .btn-full {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s ease;
    }

    .login-btn,
    .btn-full {
      background: #0077b6;
      color: white;
    }

    .login-btn:hover,
    .btn-full:hover {
      background: #005f92;
    }

    .ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
    }

    .ghost:hover {
      background: rgba(255,255,255,0.08);
    }

    #estado-login {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #ffd166;
      min-height: 20px;
    }

    #seleccion-planillas {
      display: none;
      margin-top: 18px;
    }

    #seleccion-planillas.active {
      display: block;
    }

    .titulo-modulos {
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: bold;
    }

    .acciones-secundarias {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .separador {
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 18px 0;
    }

    #admin-manager-hook {
      margin-top: 18px;
    }

    .footer-mini {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }
  </style>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("✅ SW registrado"))
          .catch(err => console.error("❌ Error SW:", err));
      });
    }
  </script>
</head>
<body>
  <div class="contenedor">
    <div class="card">
      <img src="images/logo_blanco.jpg" alt="Logo Señalco" class="logo" />

      <h1>Ingreso al sistema</h1>
      <div class="sub">Relevamiento, Base de Datos, CCTV y accesos web</div>

      <div id="login-block">
        <input type="text" id="usuario" class="login-input" placeholder="Usuario" autocomplete="username" />
        <input type="password" id="clave" class="login-input" placeholder="Clave" autocomplete="current-password" />

        <button type="button" id="btn-login" class="login-btn">Ingresar</button>

        <div class="acciones-secundarias">
          <button type="button" id="btn-actualizar-app" class="btn-full ghost">Actualizar app</button>
        </div>
      </div>

      <div id="estado-login"></div>

      <div id="seleccion-planillas">
        <div class="separador"></div>
        <div class="titulo-modulos">Módulos habilitados</div>

        <button type="button" id="btn-relevamiento" class="btn-full" style="display:none;">
          📋 Relevamiento Alarmas
        </button>

        <button type="button" id="btn-base" class="btn-full" style="display:none;">
          📊 Base de Datos
        </button>

        <button type="button" id="btn-cctv" class="btn-full" style="display:none;">
          🎥 Relevamiento CCTV
        </button>

        <button type="button" id="btn-monitoreo-web" class="btn-full" style="display:none;">
          🖥️ Monitoreo Web
        </button>
      </div>

      <div class="acciones-secundarias">
        <button type="button" id="btn-cerrar-sesion" class="btn-full ghost" style="display:none;">
          Cerrar sesión
        </button>
      </div>

      <div id="admin-manager-hook"></div>

      <div class="footer-mini">
        Señalco
      </div>
    </div>
  </div>
</body>
</html>
